; OutboundEngine PHP overrides (loaded as conf.d/zz-outboundengine.ini)

memory_limit = 512M
max_execution_time = 120

; The Product Brain ingests decks, PDFs, and case studies — allow real file sizes.
upload_max_filesize = 64M
post_max_size = 80M
max_file_uploads = 20

; OPcache. validate_timestamps=1 so code edits are picked up in local dev;
; flip revalidate_freq up (or validate_timestamps off) for a baked prod image.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Timezone for log/readability; app logic uses UTC regardless.
date.timezone = UTC
